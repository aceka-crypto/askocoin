<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Askocoin - Tap to Earn</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #f3ba2f; /* Gold/Binance yellow */
            --button-color: #2b2b2b;
            --upgrade-color: #4caf50;
        }

        * {
            box-sizing: border-box;
            user-select: none; /* Prevents text selection while tapping */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 90vh;
        }

        /* Score Display */
        .header {
            margin-top: 20px;
        }

        #score-container {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(243, 186, 47, 0.3);
            margin-bottom: 5px;
        }

        .click-power-text {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* The Coin Area */
        .coin-section {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coin {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #f3ba2f 0%, #d4a017 100%);
            border-radius: 50%;
            border: 10px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            box-shadow: 0 0 50px rgba(243, 186, 47, 0.4);
            cursor: pointer;
            transition: transform 0.1s ease; /* Fast response for click */
            position: relative;
        }

        /* Animation when clicking */
        .coin:active {
            transform: scale(0.92);
        }

        /* Floating text effect (e.g., +1) */
        .floating-text {
            position: absolute;
            color: white;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        /* Upgrade Area */
        .footer {
            margin-bottom: 20px;
        }

        .upgrade-card {
            background-color: var(--container-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .upgrade-info {
            text-align: left;
        }

        .upgrade-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .upgrade-cost {
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        .upgrade-btn {
            background-color: var(--upgrade-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .upgrade-btn:disabled {
            background-color: #333;
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Header: Balance and Current Power -->
        <div class="header">
            <div id="score-container">0</div>
            <div class="click-power-text">Click Power: <span id="click-power-val">1</span></div>
        </div>

        <!-- Main Clicker Area -->
        <div class="coin-section">
            <div id="coin" class="coin">A</div>
        </div>

        <!-- Footer: Upgrade Button -->
        <div class="footer">
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-title">Level Up Tapper</div>
                    <div class="upgrade-cost">Cost: <span id="upgrade-cost-val">10</span></div>
                </div>
                <button id="upgrade-btn" class="upgrade-btn">Buy</button>
            </div>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // 1. Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Opens the app in full-screen mode inside Telegram

        // 2. Game State Variables
        let score = parseInt(localStorage.getItem('askocoin_balance')) || 0;
        let clickPower = parseInt(localStorage.getItem('askocoin_power')) || 1;
        let upgradeCost = parseInt(localStorage.getItem('askocoin_cost')) || 10;

        // 3. UI Elements
        const scoreDisplay = document.getElementById('score-container');
        const clickPowerDisplay = document.getElementById('click-power-val');
        const upgradeCostDisplay = document.getElementById('upgrade-cost-val');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const coinBtn = document.getElementById('coin');

        // 4. Update UI Initially
        updateUI();

        // 5. Main Click Function
        coinBtn.addEventListener('click', (e) => {
            score += clickPower;
            
            // Haptic Feedback (Vibration)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Create floating text effect
            createFloatingText(e.clientX, e.clientY);
            
            saveData();
            updateUI();
        });

        // 6. Upgrade Function
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                clickPower += 1;
                upgradeCost = Math.floor(upgradeCost * 1.5); // Increase price by 50% each time

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }

                saveData();
                updateUI();
            }
        });

        // 7. Helper: Update text on screen
        function updateUI() {
            scoreDisplay.innerText = score.toLocaleString();
            clickPowerDisplay.innerText = clickPower;
            upgradeCostDisplay.innerText = upgradeCost.toLocaleString();

            // Disable upgrade button if not enough coins
            upgradeBtn.disabled = score < upgradeCost;
        }

        // 8. Helper: Save to LocalStorage
        function saveData() {
            localStorage.setItem('askocoin_balance', score);
            localStorage.setItem('askocoin_power', clickPower);
            localStorage.setItem('askocoin_cost', upgradeCost);
        }

        // 9. Visual Effect: Floating "+1"
        function createFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = `+${clickPower}`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 800);
        }

    </script>
</body>
</html>
